<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Sistema de Mantenimiento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="contrasena" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <p id="mensaje" style="color:red; margin-top:10px;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnEejftP3iYoTSAzYvDSdwHdYTEUIV8s4",
            authDomain: "proyecto-integrador-77c49.firebaseapp.com",
            projectId: "proyecto-integrador-77c49",
            storageBucket: "proyecto-integrador-77c49.firebasestorage.app",
            messagingSenderId: "1074040277954",
            appId: "1:1074040277954:web:26167a594d0c8159d6245b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = async function() {
            const usuario = document.getElementById("usuario").value.trim();
            const contrasena = document.getElementById("contrasena").value.trim();
            const mensaje = document.getElementById("mensaje");

            if (!usuario || !contrasena) {
                mensaje.textContent = "Por favor llena todos los campos.";
                return;
            }

            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                let encontrado = false;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.usuario === usuario && data.contrasena === contrasena) {
                        encontrado = true;
                        localStorage.setItem("usuarioActivo", usuario);
                        localStorage.setItem("rol", data.rol);
                        window.location.href = "dashboard.html";
                    }
                });

                if (!encontrado) {
                    mensaje.textContent = "Usuario o contraseña incorrectos.";
                }
            } catch (error) {
                mensaje.textContent = "Error al conectar con la base de datos.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
