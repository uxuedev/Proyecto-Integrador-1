<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Preventivo - Sistema de Mantenimiento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>Menú</h3>
            <a href="dashboard.html">Dashboard</a>
            <a href="equipos.html">Equipos</a>
            <a href="citas.html">Citas</a>
            <a href="historial.html">Historial</a>
            <a href="preventivo.html" style="background: var(--secondary);">Preventivo</a>
            <a href="reportes.html">Reportes</a>
            <a href="index.html" style="margin-top: 20px; border-top: 1px solid var(--secondary); padding-top: 15px;">Cerrar Sesión</a>
        </div>
        <div class="main">
            <div class="card">
                <h2>Mantenimiento Preventivo</h2>
                <button class="btn" onclick="mostrarFormulario()">Agregar Preventivo</button>

                <!-- Formulario nuevo preventivo -->
                <div id="formulario" style="display:none; margin: 15px 0; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                    <h3>Nuevo Preventivo</h3>
                    <input type="text" id="equipo" placeholder="Nombre del equipo" style="margin: 5px 0; padding: 8px; width: 100%;"><br>
                    <label style="font-size: 13px;">Último servicio:</label>
                    <input type="date" id="ultimoServicio" style="margin: 5px 0; padding: 8px; width: 100%;"><br>
                    <label style="font-size: 13px;">Próximo servicio:</label>
                    <input type="date" id="proximoServicio" style="margin: 5px 0; padding: 8px; width: 100%;"><br>
                    <button class="btn" onclick="agregarPreventivo()" style="margin-top: 10px;">Guardar</button>
                    <button onclick="ocultarFormulario()" style="margin-top: 10px; margin-left: 10px;">Cancelar</button>
                    <p id="mensajePreventivo" style="color: green;"></p>
                </div>

                <table>
                    <tr>
                        <th>Equipo</th>
                        <th>Último Servicio</th>
                        <th>Próximo</th>
                        <th>Alerta</th>
                    </tr>
                    <tbody id="tablaPreventivo">
                        <tr><td colspan="4">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnEejftP3iYoTSAzYvDSdwHdYTEUIV8s4",
            authDomain: "proyecto-integrador-77c49.firebaseapp.com",
            projectId: "proyecto-integrador-77c49",
            storageBucket: "proyecto-integrador-77c49.firebasestorage.app",
            messagingSenderId: "1074040277954",
            appId: "1:1074040277954:web:26167a594d0c8159d6245b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cargar preventivos
        async function cargarPreventivos() {
            const tbody = document.getElementById("tablaPreventivo");
            tbody.innerHTML = "";
            const snap = await getDocs(collection(db, "preventivo"));
            if (snap.empty) {
                tbody.innerHTML = "<tr><td colspan='4'>No hay registros preventivos.</td></tr>";
                return;
            }
            const hoy = new Date();
            snap.forEach(doc => {
                const d = doc.data();
                const proximo = new Date(d.proximoServicio);
                const diff = Math.ceil((proximo - hoy) / (1000 * 60 * 60 * 24));
                let alerta = "";
                if (diff < 0) {
                    alerta = `<span style="color:red;">⚠️ Vencido</span>`;
                } else if (diff <= 7) {
                    alerta = `<span style="color:orange;">⚠️ En ${diff} días</span>`;
                } else {
                    alerta = `<span style="color:green;">✔ OK</span>`;
                }
                tbody.innerHTML += `<tr>
                    <td>${d.equipo}</td>
                    <td>${d.ultimoServicio}</td>
                    <td>${d.proximoServicio}</td>
                    <td>${alerta}</td>
                </tr>`;
            });
        }

        // Agregar preventivo
        window.agregarPreventivo = async function() {
            const equipo = document.getElementById("equipo").value.trim();
            const ultimoServicio = document.getElementById("ultimoServicio").value;
            const proximoServicio = document.getElementById("proximoServicio").value;
            const mensaje = document.getElementById("mensajePreventivo");

            if (!equipo || !ultimoServicio || !proximoServicio) {
                mensaje.style.color = "red";
                mensaje.textContent = "Por favor completa todos los campos.";
                return;
            }

            if (proximoServicio <= ultimoServicio) {
                mensaje.style.color = "red";
                mensaje.textContent = "La fecha del próximo servicio debe ser posterior al último.";
                return;
            }

            await addDoc(collection(db, "preventivo"), { equipo, ultimoServicio, proximoServicio });
            mensaje.style.color = "green";
            mensaje.textContent = "Registro agendado correctamente.";
            document.getElementById("equipo").value = "";
            document.getElementById("ultimoServicio").value = "";
            document.getElementById("proximoServicio").value = "";
            cargarPreventivos();
        }

        window.mostrarFormulario = () => document.getElementById("formulario").style.display = "block";
        window.ocultarFormulario = () => document.getElementById("formulario").style.display = "none";

        cargarPreventivos();
    </script>
</body>
</html>
