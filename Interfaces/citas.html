<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Citas - Sistema de Mantenimiento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>Menú</h3>
            <a href="dashboard.html">Dashboard</a>
            <a href="equipos.html">Equipos</a>
            <a href="citas.html" style="background: var(--secondary);">Citas</a>
            <a href="historial.html">Historial</a>
            <a href="preventivo.html">Preventivo</a>
            <a href="reportes.html">Reportes</a>
            <a href="index.html" style="margin-top: 20px; border-top: 1px solid var(--secondary); padding-top: 15px;">Cerrar Sesión</a>
        </div>
        <div class="main">
            <div class="card">
                <h2>Agenda de Citas</h2>
                <button class="btn" onclick="mostrarFormulario()">Nueva Cita</button>

                <!-- Formulario nueva cita -->
                <div id="formulario" style="display:none; margin: 15px 0; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                    <h3>Nueva Cita</h3>
                    <input type="date" id="fecha" style="margin: 5px 0; padding: 8px; width: 100%;"><br>
                    <select id="equipo" style="margin: 5px 0; padding: 8px; width: 100%;">
                        <option value="">Selecciona un equipo</option>
                    </select><br>
                    <select id="estado" style="margin: 5px 0; padding: 8px; width: 100%;">
                        <option value="Pendiente">Pendiente</option>
                        <option value="Completada">Completada</option>
                        <option value="Cancelada">Cancelada</option>
                    </select><br>
                    <button class="btn" onclick="agregarCita()" style="margin-top: 10px;">Guardar</button>
                    <button onclick="ocultarFormulario()" style="margin-top: 10px; margin-left: 10px;">Cancelar</button>
                    <p id="mensajeCita" style="color: green;"></p>
                </div>

                <!-- Formulario editar cita -->
                <div id="formEditar" style="display:none; margin: 15px 0; padding: 15px; background: #fff3cd; border-radius: 8px;">
                    <h3>Editar Cita</h3>
                    <input type="date" id="editFecha" style="margin: 5px 0; padding: 8px; width: 100%;"><br>
                    <select id="editEstado" style="margin: 5px 0; padding: 8px; width: 100%;">
                        <option value="Pendiente">Pendiente</option>
                        <option value="Completada">Completada</option>
                        <option value="Cancelada">Cancelada</option>
                    </select><br>
                    <button class="btn" onclick="guardarEdicion()" style="margin-top: 10px;">Guardar cambios</button>
                    <button onclick="cerrarEdicion()" style="margin-top: 10px; margin-left: 10px;">Cancelar</button>
                </div>

                <table>
                    <tr>
                        <th>Fecha</th>
                        <th>Equipo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    <tbody id="tablaCitas">
                        <tr><td colspan="4">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnEejftP3iYoTSAzYvDSdwHdYTEUIV8s4",
            authDomain: "proyecto-integrador-77c49.firebaseapp.com",
            projectId: "proyecto-integrador-77c49",
            storageBucket: "proyecto-integrador-77c49.firebasestorage.app",
            messagingSenderId: "1074040277954",
            appId: "1:1074040277954:web:26167a594d0c8159d6245b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let citaEditando = null;

        // Cargar equipos en el select
        async function cargarEquipos() {
            const select = document.getElementById("equipo");
            select.innerHTML = "<option value=''>Selecciona un equipo</option>";
            const snap = await getDocs(collection(db, "equipos"));
            snap.forEach(docSnap => {
                const data = docSnap.data();
                select.innerHTML += `<option value="${docSnap.id}">${data.nombre}</option>`;
            });
        }

        // Cargar citas
        async function cargarCitas() {
            const tbody = document.getElementById("tablaCitas");
            tbody.innerHTML = "";
            const snap = await getDocs(collection(db, "citas"));
            if (snap.empty) {
                tbody.innerHTML = "<tr><td colspan='4'>No hay citas registradas.</td></tr>";
                return;
            }
            snap.forEach(docSnap => {
                const d = docSnap.data();
                tbody.innerHTML += `<tr>
                    <td>${d.fecha}</td>
                    <td>${d.equipo_nombre}</td>
                    <td>${d.estado}</td>
                    <td>
                        <button onclick="abrirEdicion('${docSnap.id}', '${d.fecha}', '${d.estado}')">Editar</button>
                        <button onclick="eliminarCita('${docSnap.id}')" style="margin-left: 5px; color: red;">Eliminar</button>
                    </td>
                </tr>`;
            });
        }

        // Agregar cita
        window.agregarCita = async function() {
            const fecha = document.getElementById("fecha").value;
            const select = document.getElementById("equipo");
            const equipoId = select.value;
            const equipoNombre = select.options[select.selectedIndex].text;
            const estado = document.getElementById("estado").value;
            const mensaje = document.getElementById("mensajeCita");

            if (!fecha || !equipoId) {
                mensaje.style.color = "red";
                mensaje.textContent = "Por favor completa todos los campos.";
                return;
            }

            await addDoc(collection(db, "citas"), {
                fecha,
                equipo_id: equipoId,
                equipo_nombre: equipoNombre,
                estado
            });

            mensaje.style.color = "green";
            mensaje.textContent = "Cita agendada exitosamente.";
            document.getElementById("fecha").value = "";
            select.value = "";
            cargarCitas();
        }

        // Abrir formulario editar
        window.abrirEdicion = function(id, fecha, estado) {
            citaEditando = id;
            document.getElementById("editFecha").value = fecha;
            document.getElementById("editEstado").value = estado;
            document.getElementById("formEditar").style.display = "block";
        }

        // Guardar edición
        window.guardarEdicion = async function() {
            const nuevaFecha = document.getElementById("editFecha").value;
            const nuevoEstado = document.getElementById("editEstado").value;
            if (!nuevaFecha) return;
            await updateDoc(doc(db, "citas", citaEditando), {
                fecha: nuevaFecha,
                estado: nuevoEstado
            });
            cerrarEdicion();
            cargarCitas();
        }

        // Eliminar cita
        window.eliminarCita = async function(id) {
            if (!confirm("¿Seguro que quieres eliminar esta cita?")) return;
            await deleteDoc(doc(db, "citas", id));
            cargarCitas();
        }

        window.cerrarEdicion = function() {
            document.getElementById("formEditar").style.display = "none";
        }

        window.mostrarFormulario = () => document.getElementById("formulario").style.display = "block";
        window.ocultarFormulario = () => document.getElementById("formulario").style.display = "none";

        cargarEquipos();
        cargarCitas();
    </script>
</body>
</html>
